<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pradeep's Visuals</title>
    <script>
      // GitHub Pages SPA fix — encode the path into a query string and redirect to index.html
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
